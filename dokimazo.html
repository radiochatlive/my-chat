<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        :root { 
            --bg: #1a1a1a; 
            --sidebar: #252525; 
            --text: #fff; 
            --accent: #4a90e2; 
            --dm: #9b59b6;
            --sidebar-opacity: 0.8;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            background-image: url('https://i.imgur.com/NMZc9VH.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            position: relative;
        }
        
        #bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
            pointer-events: none;
        }
        
        #login-modal, #chat-container, #banned-modal, #clear-users-modal {
            position: relative;
            z-index: 1;
        }
        
        #login-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(3px); }
        .login-box { background: var(--sidebar); padding: 30px; border-radius: 12px; text-align: center; width: 300px; max-width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        #chat-container { display: none; width: 100%; height: 100%; }
        #main-chat { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        
        #messages { flex: 1; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        #messages::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent), var(--dm)); border-radius: 10px; }
        #messages::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #5a9fe2, #ab69c6); }
        #messages { scrollbar-width: thin; scrollbar-color: var(--accent) rgba(255, 255, 255, 0.05); }
        
        .message { max-width: 70%; padding: 10px 14px; border-radius: 18px; display: flex; gap: 10px; align-items: flex-start; }
        .message.own { align-self: flex-end; background: var(--accent); flex-direction: row-reverse; }
        .message.other { align-self: flex-start; background: #333; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        
        #sidebar { 
            width: 250px; 
            background: transparent;
            padding: 15px; 
            border-left: 1px solid #444; 
            overflow-y: auto; 
            position: relative;
        }
        #sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, var(--sidebar-opacity));
            z-index: 0;
            pointer-events: none;
        }
        #sidebar h3, #sidebar #user-list {
            position: relative;
            z-index: 1;
        }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        #sidebar::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent), var(--dm)); border-radius: 10px; }
        #sidebar { scrollbar-width: thin; scrollbar-color: var(--accent) rgba(255, 255, 255, 0.05); }
        
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 5px; border-radius: 8px; }
        .user-item:hover { background: rgba(0, 0, 0, 0.4); }
        
        .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; position: relative; }
        input[type="text"], input[type="password"], input[type="number"] { flex: 1; min-width: 150px; padding: 12px; border: none; border-radius: 8px; background: #333; color: white; outline: none; margin-bottom: 8px; }
        button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; background: var(--accent); color: white; }
        button:hover { opacity: 0.85; }
        button.logout { background: #e74c3c; }
        button.ban-btn { background: #e74c3c; padding: 4px 8px; font-size: 12px; margin-left: auto; }
        button.banned-panel-btn { background: #9b59b6; }
        button.clear-chat-btn { background: #e67e22; }
        button.clear-users-btn { background: #16a085; }
        button.dm-btn { background: var(--dm); padding: 4px 8px; font-size: 12px; }
        button.back-btn { background: #7f8c8d; }
        button.theme-btn { background: #f39c12; }
        button.emoji-btn { background: #f1c40f; color: #000; font-size: 16px; }
        button.volume-btn { background: #27ae60; }
        
        #toggle-sidebar { display: none; }
        .admin-badge { background: #f1c40f; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 5px; }
        
        #banned-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .banned-box { background: var(--sidebar); padding: 30px; border-radius: 12px; width: 400px; max-width: 90%; max-height: 80vh; overflow-y: auto; }
        .banned-box::-webkit-scrollbar { width: 6px; }
        .banned-box::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .banned-box::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent), var(--dm)); border-radius: 10px; }
        .banned-box { scrollbar-width: thin; scrollbar-color: var(--accent) rgba(255, 255, 255, 0.05); }
        
        .banned-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin: 8px 0; background: #333; border-radius: 8px; }
        .unban-btn { background: #27ae60; padding: 6px 12px; font-size: 12px; }
        
        #clear-users-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 250; justify-content: center; align-items: center; }
        .clear-users-box { background: var(--sidebar); padding: 30px; border-radius: 12px; width: 450px; max-width: 90%; max-height: 85vh; overflow-y: auto; }
        .clear-users-box h2 { margin-top: 0; }
        .period-btn { 
            background: #333; 
            padding: 12px 16px; 
            margin: 5px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .period-btn:hover { background: #444; }
        .period-btn.selected { 
            background: var(--accent); 
            border-color: #fff;
        }
        .period-buttons { display: flex; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        .custom-input { display: none; margin: 10px 0; }
        .custom-input.active { display: flex; align-items: center; gap: 8px; }
        .custom-input input { width: 80px; flex: 0 0 auto; margin: 0; }
        #clear-users-preview { 
            background: #333; 
            padding: 10px; 
            border-radius: 8px; 
            margin: 15px 0;
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
        }
        #clear-users-preview::-webkit-scrollbar { width: 4px; }
        #clear-users-preview::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .preview-item { padding: 4px 8px; margin: 2px 0; background: #2a2a2a; border-radius: 4px; }
        #clear-users-progress {
            display: none;
            background: #16a085;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }
        #clear-users-progress.active { display: block; }
        
        #dm-header { display: none; background: var(--dm); padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; align-items: center; gap: 10px; }
        #dm-header.active { display: flex; }
        #dm-header strong { flex: 1; }
        
        #dm-notification { display: none; background: var(--dm); padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; align-items: center; gap: 10px; animation: pulse 1.5s infinite; }
        #dm-notification.active { display: flex; }
        #dm-notification:hover { opacity: 0.9; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        #theme-panel { display: none; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; align-items: center; gap: 10px; }
        #theme-panel.active { display: flex; }
        #theme-panel label { font-size: 14px; }
        #theme-slider { flex: 1; cursor: pointer; }
        
        #volume-panel { display: none; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; align-items: center; gap: 10px; }
        #volume-panel.active { display: flex; }
        #volume-panel label { font-size: 14px; }
        #volume-slider { flex: 1; cursor: pointer; }
        #volume-mute-btn { background: #e74c3c; padding: 6px 10px; font-size: 12px; }
        
        #emoji-panel {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 0;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 10px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 80;
        }
        #emoji-panel.active { display: block; }
        #emoji-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
        }
        #emoji-panel-header strong { font-size: 14px; }
        #emoji-panel-close { background: #e74c3c; padding: 4px 10px; font-size: 12px; border-radius: 6px; }
        #emoji-categories { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
        .emoji-cat-btn { background: #333; padding: 6px 10px; font-size: 14px; border-radius: 6px; flex: 1; min-width: 40px; }
        .emoji-cat-btn.active { background: var(--accent); }
        #emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; padding-right: 4px; }
        #emoji-grid::-webkit-scrollbar { width: 4px; }
        #emoji-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .emoji-item { background: transparent; border: none; font-size: 22px; padding: 4px; cursor: pointer; border-radius: 6px; transition: background 0.2s, transform 0.1s; }
        .emoji-item:hover { background: #444; transform: scale(1.2); }
        
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #lightbox.active { display: flex; }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #lightbox-close:hover { background: #c0392b; }
        .message img[style*="max-width:200px"] {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .message img[style*="max-width:200px"]:hover {
            transform: scale(1.05);
        }
        
        #clear-progress {
            display: none;
            background: #e67e22;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        #clear-progress.active { display: block; }
        
        @media (max-width: 768px) {
            #main-chat { padding: 10px; }
            #sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100vh; z-index: 50; transition: right 0.3s ease; box-shadow: -2px 0 10px rgba(0,0,0,0.5); }
            #sidebar.open { right: 0; }
            #toggle-sidebar { display: block; position: fixed; top: 10px; right: 10px; z-index: 60; background: var(--accent); padding: 10px 15px; border-radius: 8px; }
            .message { max-width: 85%; }
            .controls { gap: 5px; }
            button { padding: 8px 10px; font-size: 14px; }
            #emoji-grid { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>
    
    <div id="lightbox" onclick="closeLightbox()">
        <button id="lightbox-close" onclick="closeLightbox()">✕</button>
        <img id="lightbox-img" src="" alt="Full size">
    </div>
    
    <div id="login-modal">
        <div class="login-box">
            <h2>Είσοδος</h2>
            <input type="text" id="username" placeholder="Όνομα" style="width:100%; margin:10px 0; padding:10px;">
            <input type="password" id="admin-pass" placeholder="Κωδικός Admin (προαιρετικό)" style="width:100%; margin:0 0 10px 0; padding:10px;">
            <button onclick="enterChat()" style="width:100%;">Είσοδος</button>
        </div>
    </div>
    
    <div id="chat-container">
        <button id="toggle-sidebar">☰ Χρήστες</button>
        <div id="main-chat">
            <div id="dm-notification" onclick="openDMFromNotification()">
                <span>💬</span>
                <strong id="dm-notification-text">Νέο μήνυμα</strong>
                <span>→</span>
            </div>
            <div id="dm-header">
                <button class="back-btn" onclick="closeDM()">← Πίσω</button>
                <strong id="dm-partner-name">Συνομιλία</strong>
            </div>
            <div id="clear-progress">🧹 Διαγραφή μηνυμάτων...</div>
            <div id="messages"></div>
            <div id="theme-panel">
                <label>🎨 Σκουρότητα:</label>
                <input type="range" id="theme-slider" min="0" max="100" value="60">
                <span id="theme-value">60%</span>
            </div>
            <div id="volume-panel">
                <label>🔊 Ένταση:</label>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
                <span id="volume-value">50%</span>
                <button id="volume-mute-btn" onclick="toggleMute()">🔇 Mute</button>
            </div>
            <div class="controls">
                <div id="emoji-panel">
                    <div id="emoji-panel-header">
                        <strong>Διάλεξε emoji</strong>
                        <button id="emoji-panel-close" onclick="toggleEmojiPanel()">✕</button>
                    </div>
                    <div id="emoji-categories">
                        <button class="emoji-cat-btn active" onclick="showEmojiCategory('faces')">😀</button>
                        <button class="emoji-cat-btn" onclick="showEmojiCategory('hands')">👍</button>
                        <button class="emoji-cat-btn" onclick="showEmojiCategory('hearts')">❤️</button>
                        <button class="emoji-cat-btn" onclick="showEmojiCategory('animals')">🐶</button>
                        <button class="emoji-cat-btn" onclick="showEmojiCategory('food')">🍕</button>
                        <button class="emoji-cat-btn" onclick="showEmojiCategory('objects')">⚽</button>
                        <button class="emoji-cat-btn" onclick="showEmojiCategory('symbols')">💯</button>
                    </div>
                    <div id="emoji-grid"></div>
                </div>
                <input type="text" id="msg-input" placeholder="Μήνυμα...">
                <button class="emoji-btn" onclick="toggleEmojiPanel()">😊</button>
                <input type="file" id="img-upload" style="display:none" accept="image/*">
                <button id="upload-btn">🖼️</button>
                <button onclick="sendMessage()">Αποστολή</button>
                <button id="banned-btn" class="banned-panel-btn" onclick="openBannedPanel()" style="display:none;">🚫 Banned</button>
                <button id="clear-chat-btn" class="clear-chat-btn" onclick="clearPublicChat()" style="display:none;">️ Καθαρισμός</button>
                <button id="clear-users-btn" class="clear-users-btn" onclick="openClearUsersModal()" style="display:none;">🧹 Ονόματα</button>
                <button class="theme-btn" onclick="toggleThemePanel()">🎨</button>
                <button class="volume-btn" onclick="toggleVolumePanel()"> Ήχος</button>
                <button class="logout" onclick="logout()">🚪 Αποχώρηση</button>
            </div>
        </div>
        <div id="sidebar">
            <div id="sidebar-overlay"></div>
            <h3>Online (<span id="online-count">0</span>)</h3>
            <div id="user-list"></div>
        </div>
    </div>
    
    <div id="banned-modal">
        <div class="banned-box">
            <h2 style="margin-top:0;">🚫 Αποκλεισμένοι Χρήστες</h2>
            <div id="banned-list"></div>
            <button onclick="closeBannedPanel()" style="width:100%; margin-top:15px;">Κλείσιμο</button>
        </div>
    </div>
    
    <div id="clear-users-modal">
        <div class="clear-users-box">
            <h2 style="margin-top:0;">🧹 Καθαρισμός Ονομάτων</h2>
            <p style="color:#ccc; margin-bottom:15px;">Διάλεξε ποια ονόματα θα διαγραφούν (αυτά που δεν έχουν συνδεθεί για το επιλεγμένο διάστημα):</p>
            
            <div class="period-buttons">
                <button class="period-btn" onclick="selectPeriod(7, this)">🗓️ 1 εβδομάδα</button>
                <button class="period-btn" onclick="selectPeriod(30, this)">🗓️ 1 μήνα</button>
                <button class="period-btn" onclick="selectPeriod(90, this)">️ 3 μήνες</button>
                <button class="period-btn" onclick="selectPeriod('custom', this)">✏️ Άλλο...</button>
            </div>
            
            <div id="custom-input-container" class="custom-input">
                <span>Ημέρες:</span>
                <input type="number" id="custom-days" min="1" max="365" placeholder="π.χ. 45" oninput="updatePreview()">
            </div>
            
            <div id="clear-users-preview" style="display:none;">
                <strong>Θα διαγραφούν:</strong>
                <div id="preview-list"></div>
            </div>
            
            <div id="clear-users-progress">🧹 Διαγραφή...</div>
            
            <div style="display:flex; gap:8px; margin-top:15px;">
                <button onclick="executeClearUsers()" id="execute-clear-btn" style="flex:1; background:#16a085;" disabled>✅ Εκτέλεση</button>
                <button onclick="closeClearUsersModal()" style="flex:1; background:#7f8c8d;">❌ Ακύρωση</button>
            </div>
        </div>
    </div>
    
    <input type="file" id="avatar-upload" style="display:none" accept="image/*">

    <script type="module">
    // 1. Εισαγωγή Supabase
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // 2. Σύνδεση με τη δική σου βάση δεδομένων
    const SUPABASE_URL = 'https://hfnzcltouedgzcsykszq.supabase.co'; // Το URL σου από τη φωτό 33_2.png
    const SUPABASE_KEY = 'ΒΑΛΕ_ΕΔΩ_ΤΟ_ΔΙΚΟ_ΣΟΥ_ANON_PUBLIC_KEY'; // Αντικατάστησέ το με το κλειδί σου

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Διαχειριστής (Admin)
    const ADMIN_NAME = "sakis";[cite: 1]
    const ADMIN_PASS = "019630";[cite: 1]

    let currentUser = null;[cite: 1]
    let currentDM = null;[cite: 1]
    let currentDMChatId = null;[cite: 1]
    let bannedUsers = JSON.parse(localStorage.getItem('bannedUsers')) || [];[cite: 1]

    // Λίστα με avatars
    const avatars = [
        "https://cdn-icons-png.flaticon.com/512/4140/4140037.png",
        "https://cdn-icons-png.flaticon.com/512/4140/4140048.png",
        "https://cdn-icons-png.flaticon.com/512/4139/4139993.png",
        "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
        "https://cdn-icons-png.flaticon.com/512/3135/3135768.png",
        "https://cdn-icons-png.flaticon.com/512/4140/4140061.png"
    ];[cite: 1]

    // Αρχικό Setup Μόλις Φορτώσει η Σελίδα
    window.addEventListener('DOMContentLoaded', () => {
        setupAvatars();[cite: 1]
        loadMessages(); // Φόρτωμα δημόσιων μηνυμάτων σε πραγματικό χρόνο
        loadActiveUsers(); // Φόρτωμα ενεργών χρηστών σε πραγματικό χρόνο
        
        // Event listeners για κουμπιά[cite: 1]
        document.getElementById('login-btn').addEventListener('click', login);[cite: 1]
        document.getElementById('send-btn').addEventListener('click', sendMessage);[cite: 1]
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key==='Enter') sendMessage(); });[cite: 1]
        document.getElementById('img-btn').addEventListener('click', () => document.getElementById('file-input').click());[cite: 1]
        document.getElementById('file-input').addEventListener('change', uploadImage);[cite: 1]
        document.getElementById('back-to-public-btn').addEventListener('click', backToPublicChat);[cite: 1]
        
        // Emoji panel toggle[cite: 1]
        document.getElementById('emoji-btn').addEventListener('click', () => {
            const panel = document.getElementById('emoji-panel');[cite: 1]
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';[cite: 1]
        });
        setupEmojis();[cite: 1]
    });

    function setupAvatars() {
        const container = document.getElementById('avatar-options');[cite: 1]
        container.innerHTML = '';[cite: 1]
        avatars.forEach((src, idx) => {
            const img = document.createElement('img');[cite: 1]
            img.src = src;[cite: 1]
            img.classList.add('avatar-option');[cite: 1]
            if(idx === 0) img.classList.add('selected');[cite: 1]
            img.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));[cite: 1]
                img.classList.add('selected');[cite: 1]
            };
            container.appendChild(img);[cite: 1]
        });
    }

    function setupEmojis() {
        const panel = document.getElementById('emoji-panel');[cite: 1]
        const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','👹','👺','🤡','💩','👻','💀','☠️','👽','👾','🤖','🎃','😺','😸','😹','😻','😼','😽','🙀','😿','😾'];[cite: 1]
        panel.innerHTML = '';[cite: 1]
        emojis.forEach(emoji => {
            const span = document.createElement('span');[cite: 1]
            span.innerText = emoji;[cite: 1]
            span.style.cursor = 'pointer';[cite: 1]
            span.style.fontSize = '20px';[cite: 1]
            span.style.margin = '5px';[cite: 1]
            span.onclick = () => {
                const input = document.getElementById('msg-input');[cite: 1]
                input.value += emoji;[cite: 1]
                panel.style.display = 'none';[cite: 1]
                input.focus();[cite: 1]
            };
            panel.appendChild(span);[cite: 1]
        });
    }

    // Είσοδος Χρήστη στο Τσατ
    async function login() {
        const usernameInput = document.getElementById('username-input').value.trim();[cite: 1]
        if (!usernameInput) return alert("Παρακαλώ βάλτε ένα όνομα!");[cite: 1]

        if (bannedUsers.includes(usernameInput.toLowerCase())) {[cite: 1]
            return alert("Έχετε αποκλειστεί από αυτή τη συνομιλία.");[cite: 1]
        }

        let isAdmin = false;[cite: 1]
        if (usernameInput.toLowerCase() === ADMIN_NAME.toLowerCase()) {[cite: 1]
            const pass = prompt("Δώστε κωδικό διαχειριστή:");[cite: 1]
            if (pass !== ADMIN_PASS) {[cite: 1]
                return alert("Λάθος κωδικός!");[cite: 1]
            }
            isAdmin = true;[cite: 1]
        }

        const selectedAvatarImg = document.querySelector('.avatar-option.selected');[cite: 1]
        const avatarSrc = selectedAvatarImg ? selectedAvatarImg.src : avatars[0];[cite: 1]

        currentUser = { name: usernameInput, avatar: avatarSrc, isAdmin: isAdmin };[cite: 1]

        // Αποθήκευση ή ενημέρωση χρήστη στη Supabase
        await supabase
            .from('users')
            .upsert([{ name: currentUser.name, avatar: currentUser.avatar, isAdmin: currentUser.isAdmin, lastSeen: new Date().toISOString() }]);

        document.getElementById('login-screen').style.display = 'none';[cite: 1]
        document.getElementById('chat-screen').style.display = 'flex';[cite: 1]
        
        playNotificationSound();[cite: 1]
        updatePresence();[cite: 1]
        setInterval(updatePresence, 20000); // Κρατάει τον χρήστη ενεργό κάθε 20 δεύτερα
    }

    // Ενημέρωση ότι ο χρήστης είναι online
    async function updatePresence() {
        if (!currentUser) return;[cite: 1]
        await supabase
            .from('users')
            .update({ lastSeen: new Date().toISOString() })
            .eq('name', currentUser.name);
    }

    // Φόρτωμα και Ακρόαση Μηνυμάτων σε Πραγματικό Χρόνο (Realtime)
    async function loadMessages() {
        // Παίρνουμε τα τελευταία 50 μηνύματα
        const { data: initialMsgs } = await supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true })
            .limit(50);

        if (initialMsgs) {
            initialMsgs.forEach(msg => renderMessage(msg));[cite: 1]
            scrollToBottom();[cite: 1]
        }

        // Ακρόαση για νέα μηνύματα σε πραγματικό χρόνο
        supabase
            .channel('public-messages')
            .on('postgres_changes', { event: 'INSERT', filter: 'id=neq.0', schema: 'public', table: 'messages' }, payload => {
                if (!currentDM) {
                    renderMessage(payload.new);[cite: 1]
                    scrollToBottom();[cite: 1]
                    playNotificationSound();[cite: 1]
                }
            })
            .subscribe();
    }

    // Φόρτωμα και Ακρόαση Ενεργών Χρηστών
    async function loadActiveUsers() {
        const refreshUsers = async () => {
            // Θεωρούμε ενεργούς όσους έδωσαν σημεία ζωής τα τελευταία 60 δευτερόλεπτα
            const targetTime = new Date(Date.now() - 60000).toISOString();
            const { data: onlineUsers } = await supabase
                .from('users')
                .select('*')
                .gt('lastSeen', targetTime);

            const list = document.getElementById('users-list');[cite: 1]
            list.innerHTML = '';[cite: 1]

            if (onlineUsers) {
                onlineUsers.forEach(user => {
                    if (currentUser && user.name === currentUser.name) return;[cite: 1]
                    
                    const div = document.createElement('div');[cite: 1]
                    div.classList.add('user-item');[cite: 1]
                    div.innerHTML = `
                        <img src="${user.avatar}" class="user-avatar" alt="">
                        <span>${user.name} ${user.isAdmin ? '<b style="color:red;">(Admin)</b>' : ''}</span>
                    `;[cite: 1]
                    
                    // Πατώντας πάνω στον χρήστη ξεκινάει DM (εκτός αν είσαι Ban)[cite: 1]
                    div.onclick = () => {
                        if (currentUser.isAdmin) {[cite: 1]
                            showAdminActionModal(user.name);[cite: 1]
                        } else {
                            startDM(user.name);[cite: 1]
                        }
                    };
                    list.appendChild(div);[cite: 1]
                });
            }
        };

        refreshUsers();
        setInterval(refreshUsers, 10000); // Ανανέωση λίστας χρηστών κάθε 10 δεύτερα
    }

    // Εμφάνιση Μηνύματος στην Οθόνη
    function renderMessage(msg) {
        const box = document.getElementById('chat-box');[cite: 1]
        const div = document.createElement('div');[cite: 1]
        div.classList.add('message');[cite: 1]
        
        if (currentUser && msg.user === currentUser.name) div.classList.add('my-message');[cite: 1]

        let mediaHtml = '';[cite: 1]
        if (msg.image) mediaHtml = `<br><img src="${msg.image}" class="chat-img" onclick="window.open('${msg.image}', '_blank')">`;[cite: 1]

        div.innerHTML = `
            <img src="${msg.userAvatar || avatars[0]}" class="user-avatar" alt="">
            <div class="message-content">
                <div class="message-sender">${msg.user}</div>
                <div class="message-text">${msg.text}${mediaHtml}</div>
            </div>
        `;[cite: 1]
        box.appendChild(div);[cite: 1]
    }

    // Αποστολή Μηνύματος
    window.sendMessage = async () => {
        const input = document.getElementById('msg-input');[cite: 1]
        const text = input.value.trim();[cite: 1]
        if (!text || !currentUser) return;[cite: 1]

        if (currentDM) {
            // Αποστολή DM
            await supabase.from('messages').insert([{ 
                text: `[DM_TO:${currentDM}] ${text}`, 
                user: currentUser.name, 
                userAvatar: currentUser.avatar 
            }]);
        } else {
            // Αποστολή Δημόσιου Μηνύματος
            await supabase.from('messages').insert([{ 
                text: text, 
                user: currentUser.name, 
                userAvatar: currentUser.avatar 
            }]);
        }
        input.value = '';[cite: 1]
    };

    // Ανέβασμα Εικόνας (Μετατροπή σε Base64 για ευκολία χωρίς Storage)
    function uploadImage(e) {
        const file = e.target.files[0];[cite: 1]
        if (!file) return;[cite: 1]
        const reader = new FileReader();[cite: 1]
        reader.onload = async () => {
            if (!currentUser) return;[cite: 1]
            await supabase.from('messages').insert([{ 
                text: '📸 Απέστειλε εικόνα', 
                image: reader.result, 
                user: currentUser.name, 
                userAvatar: currentUser.avatar 
            }]);
        };
        reader.readAsDataURL(file);[cite: 1]
    }

    // Λειτουργία DM (Προσωπικά Μηνύματα)[cite: 1]
    function startDM(targetUserName) {
        currentDM = targetUserName;[cite: 1]
        document.getElementById('chat-title').innerText = `Συνομιλία με ${targetUserName}`;[cite: 1]
        document.getElementById('back-to-public-btn').style.display = 'inline-block';[cite: 1]
        document.getElementById('chat-box').innerHTML = '';[cite: 1]
        loadDMMessages();[cite: 1]
    }

    async function loadDMMessages() {
        const { data: dmMsgs } = await supabase
            .from('messages')
            .select('*')
            .or(`text.like.[DM_TO:${currentDM}],and(user.eq.${currentDM},text.like.*[DM_TO:${currentUser.name}]*)`)
            .order('created_at', { ascending: true });

        document.getElementById('chat-box').innerHTML = '';[cite: 1]
        if (dmMsgs) {
            dmMsgs.forEach(msg => {
                // Καθαρίζουμε το πρόθεμα [DM_TO:...] για να φαίνεται όμορφα το κείμενο
                const cleanText = msg.text.replace(/^\[DM_TO:[^\]]+\]\s*/, '');
                renderMessage({ ...msg, text: cleanText });[cite: 1]
            });
            scrollToBottom();[cite: 1]
        }
    }

    function backToPublicChat() {
        currentDM = null;[cite: 1]
        document.getElementById('chat-title').innerText = "Ραδιοφωνική Συνομιλία";[cite: 1]
        document.getElementById('back-to-public-btn').style.display = 'none';[cite: 1]
        document.getElementById('chat-box').innerHTML = '';[cite: 1]
        loadMessages();[cite: 1]
    }

    // Λειτουργίες Διαχειριστή (Admin Actions: DM ή Ban)[cite: 1]
    function showAdminActionModal(targetUser) {
        const action = prompt(`Επιλέξτε ενέργεια για τον χρήστη ${targetUser}:\n1. Προσωπικό Μήνυμα (DM)\n2. Αποκλεισμός (Ban)`);[cite: 1]
        if (action === '1') {[cite: 1]
            startDM(targetUser);[cite: 1]
        } else if (action === '2') {[cite: 1]
            if (confirm(`Είστε σίγουρος ότι θέλετε να κάνετε BAN τον χρήστη ${targetUser};`)) {[cite: 1]
                bannedUsers.push(targetUser.toLowerCase());[cite: 1]
                localStorage.setItem('bannedUsers', JSON.stringify(bannedUsers));[cite: 1]
                alert(`Ο χρήστης ${targetUser} αποκλείστηκε!`);[cite: 1]
            }
        }
    }

    function scrollToBottom() {
        const box = document.getElementById('chat-box');[cite: 1]
        box.scrollTop = box.scrollHeight;[cite: 1]
    }

    function playNotificationSound() {
        const audio = document.getElementById('notification-sound');[cite: 1]
        if(audio) audio.play().catch(()=>{});[cite: 1]
    }
</script>
